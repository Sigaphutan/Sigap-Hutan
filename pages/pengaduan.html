<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pengaduan | SIGAP HUTAN</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="../index.html">
                🌲 SIGAP HUTAN
            </a>

        </div>

    </nav>

    <section class="py-5">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-9">

                    <div class="card shadow border-0">

                        <div class="card-header bg-success text-white">

                            <h3 class="mb-0">

                                <i class="bi bi-megaphone-fill"></i>

                                Form Pengaduan Gangguan Kehutanan

                            </h3>

                        </div>

                        <div class="card-body">

                            <form id="formPengaduan">

                                <h5 class="text-success mb-3">
                                    Data Pelapor
                                </h5>

                                <div class="mb-3">

                                    <label class="form-label">

                                        Nama Pelapor

                                    </label>

                                    <input
                                        type="text"
                                        id="nama"
                                        class="form-control"
                                        placeholder="Masukkan nama"
                                        required>

                                </div>

                                <hr>

                                <h5 class="text-success mb-3">

                                    Lokasi Kejadian

                                </h5>

                              <div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">
            Kabupaten
        </label>

        <select id="kabupaten" class="form-select" required>

            <option value="">Pilih Kabupaten</option>

            <option value="Aceh Tenggara">Aceh Tenggara</option>

            <option value="Gayo Lues">Gayo Lues</option>

        </select>

    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Kecamatan

                                        </label>

                                        <select
                                            id="kecamatan"
                                            class="form-select"
                                            required>

                                            <option value="">

                                                Pilih Kecamatan

                                            </option>

                                        </select>

                                    </div>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">

                                        Lokasi Kejadian

                                    </label>

                                    <input
                                        type="text"
                                        id="lokasi"
                                        class="form-control"
                                        placeholder="Contoh : Desa Lawe Bulan"
                                        required>

                                </div>

                                <hr>

                                <h5 class="text-success mb-3">

                                    Jenis Gangguan

                                </h5>

                                <div class="mb-3">

                                    <select
                                        id="jenis"
                                        class="form-select"
                                        required>

                                        <option value="">
                                            Pilih Jenis Gangguan
                                        </option>

                                        <option>
                                            🌲 Penebangan Liar
                                        </option>

                                        <option>
                                            🔥 Karhutla
                                        </option>

                                        <option>
                                            🚜 Pembukaan Lahan Tanpa Izin
                                        </option>

                                        <option>
                                            🦌 Perburuan Satwa Liar
                                        </option>

                                        <option>
                                            🌱 Kerusakan Hutan
                                        </option>

                                        <option>
                                            🌿 Rehabilitasi Hutan
                                        </option>

                                        <option>
                                            📍 Lainnya
                                        </option>

                                    </select>

                                </div>
                                <hr>

<h5 class="text-success mb-3">

    Informasi Kejadian

</h5>

<div class="row">

    <div class="col-md-6 mb-3">

        <label class="form-label">

            Tanggal Kejadian

        </label>

        <input
            type="date"
            id="tanggal"
            class="form-control"
            required>

    </div>

    <div class="col-md-6 mb-3">

        <label class="form-label">

            Foto Bukti (Opsional)

        </label>

        <input
            type="file"
            id="foto"
            class="form-control"
            accept="image/*">

    </div>

</div>

<div class="mb-4">

    <label class="form-label">

        Uraian Pengaduan

    </label>

    <textarea
        id="deskripsi"
        class="form-control"
        rows="6"
        placeholder="Tuliskan kronologi kejadian secara lengkap..."
        required></textarea>

</div>

<div class="alert alert-success d-none" id="pesanBerhasil">

    <i class="bi bi-check-circle-fill"></i>

    Pengaduan berhasil dikirim.

</div>

<div class="d-grid">

    <button
        type="submit"
        class="btn btn-success btn-lg">

        <i class="bi bi-send-fill"></i>

        Kirim Pengaduan

    </button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

<footer class="bg-dark text-white text-center p-4">

    © 2026 SIGAP HUTAN

    <br>

    UPTD KPH Wilayah VIII Aceh

</footer>

<script type="module" src="../js/pengaduan.js"></script>

</body>

</html>
