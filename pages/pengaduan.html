<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengaduan | SIGAP HUTAN</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">

<div class="container">

<a class="navbar-brand fw-bold" href="../index.html">

SIGAP HUTAN

</a>

</div>

</nav>

<section class="py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg border-0">

<div class="card-header bg-success text-white">

<h3>

<i class="bi bi-megaphone-fill"></i>

Form Pengaduan Gangguan Kehutanan

</h3>

</div>

<div class="card-body">

<form>

<div class="mb-3">

<label class="form-label">

Nama Lengkap

</label>

<input
type="text"
class="form-control"
placeholder="Masukkan nama lengkap">

</div>

<div class="mb-3">

<label class="form-label">

Nomor HP

</label>

<input
type="tel"
class="form-control"
placeholder="08xxxxxxxxxx">

</div>

<div class="mb-3">

<label class="form-label">

Email

</label>

<input
type="email"
class="form-control"
placeholder="email@gmail.com">

</div>

<div class="mb-3">

<label class="form-label">

Jenis Gangguan

</label>

<select class="form-select">

<option>Pilih</option>

<option>Pembalakan Liar</option>

<option>Perambahan Hutan</option>

<option>Kebakaran Hutan</option>

<option>Perburuan Satwa</option>

<option>Lainnya</option>

</select>

</div>

<div class="mb-3">

<label>

Lokasi Kejadian

</label>

<input
type="text"
class="form-control"
placeholder="Contoh : Desa Lawe Bulan">

</div>

<div class="mb-3">

<label>

Tanggal Kejadian

</label>

<input
type="date"
class="form-control">

</div>

<div class="mb-3">

<label>

Unggah Foto Bukti

</label>

<input
type="file"
class="form-control">

</div>

<div class="mb-3">

<label>

Uraian Pengaduan

</label>

<textarea
rows="6"
class="form-control"
placeholder="Tuliskan kronologi kejadian..."></textarea>

</div>

<div class="d-grid">

<button
class="btn btn-success btn-lg">

<i class="bi bi-send-fill"></i>

Kirim Pengaduan

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

<footer class="bg-dark text-white text-center p-4">

© 2026 SIGAP HUTAN

<br>

UPTD KPH Wilayah VIII Aceh

</footer>

<script src="../js/script.js"></script>

</body>

</html>
