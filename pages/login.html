<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin | SIGAP HUTAN</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,70,40,.65),rgba(0,70,40,.65)),
    url("../images/hero.jpg") center/cover no-repeat;
}

.login-box{

    width:420px;
    max-width:95%;

    background:#fff;

    border-radius:20px;

    padding:35px;

    box-shadow:0 15px 40px rgba(0,0,0,.35);

}

.logo{

    width:90px;
    display:block;
    margin:auto;

}

h2{

    text-align:center;
    color:#198754;
    margin-top:15px;

    font-weight:bold;

}

p{

    text-align:center;
    color:#777;
    margin-bottom:30px;

}

.input-group-text{

    background:#198754;
    color:white;
    border:none;

}

.form-control{

    height:48px;

}

.btn-login{

    background:#198754;
    border:none;
    height:48px;
    font-weight:bold;

}

.btn-login:hover{

    background:#157347;

}

.google-btn{

    height:48px;

}

.footer{

    margin-top:25px;
    text-align:center;
    color:#777;
    font-size:13px;

}

</style>

</head>

<body>

<div class="login-box">

<img src="../images/logo.png" class="logo">

<h2>SIGAP HUTAN</h2>

<p>Portal Admin UPTD KPH Wilayah VIII Aceh</p>

<form id="loginForm">

<div class="mb-3">

<label>ID Admin</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="text"
id="username"
class="form-control"
placeholder="Masukkan ID Admin"
required>

</div>

</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
id="password"
class="form-control"
placeholder="Masukkan Password"
required>

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword()">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
id="remember">

<label class="form-check-label">

Ingat Saya

</label>

</div>

<button class="btn btn-success w-100 btn-login">

Masuk

</button>

<hr>

<button
type="button"
id="googleLogin"
class="btn btn-light border w-100 google-btn">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
width="20">

Masuk dengan Google

</button>

</form>

<div class="footer">

© SIGAP HUTAN 2026

</div>

</div>

<script>

function togglePassword(){

const p=document.getElementById("password");

p.type=p.type==="password"?"text":"password";

}

// Remember Me

window.onload=function(){

const u=localStorage.getItem("username");
const p=localStorage.getItem("password");

if(u){

document.getElementById("username").value=u;

}

if(p){

document.getElementById("password").value=p;

document.getElementById("remember").checked=true;

}

};

</script>

<script type="module" src="../js/login.js"></script>

</body>
</html>
