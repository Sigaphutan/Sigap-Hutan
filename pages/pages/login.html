<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin | SIGAP HUTAN</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,60,30,.65),rgba(0,60,30,.65)),
    url("../images/hero.jpg") center/cover no-repeat;

    font-family:Segoe UI,sans-serif;
}

.login-card{

    width:400px;
    max-width:90%;

    background:#fff;
    border-radius:20px;
    padding:35px;

    box-shadow:0 10px 35px rgba(0,0,0,.35);

}

.logo{

    width:90px;
    display:block;
    margin:auto;

}

h3{

    margin-top:15px;
    margin-bottom:5px;
    text-align:center;
    color:#198754;
    font-weight:bold;

}

.subtitle{

    text-align:center;
    color:#666;
    margin-bottom:25px;

}

.input-group-text{

    background:#198754;
    color:white;

}

.btn-login{

    background:#198754;
    border:none;
    font-weight:bold;

}

.btn-login:hover{

    background:#157347;

}

.footer{

    text-align:center;
    margin-top:20px;
    color:#888;
    font-size:13px;

}

</style>

</head>

<body>

<div class="login-card">

<img src="../images/logo.png" class="logo">

<h3>SIGAP HUTAN</h3>

<div class="subtitle">

Portal Admin

</div>

<form id="loginForm">

<div class="mb-3">

<label>ID Admin</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="text"
class="form-control"
id="username"
placeholder="Masukkan ID"
required>

</div>

</div>

<div class="mb-4">

<label>Password</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
class="form-control"
id="password"
placeholder="Masukkan Password"
required>

<button class="btn btn-outline-secondary"
type="button"
onclick="togglePassword()">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<button class="btn btn-success w-100 btn-login">

Masuk Admin

</button>

</form>

<div class="footer">

UPTD KPH Wilayah VIII Aceh

</div>

</div>

<script src="../js/login.js"></script>

<script>

function togglePassword(){

const p=document.getElementById("password");

p.type=p.type==="password"?"text":"password";

}

</script>

</body>
</html>
